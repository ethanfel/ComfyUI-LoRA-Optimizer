<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 888" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#888"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1020" height="888" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="510" y="38" text-anchor="middle" fill="#e0e0e0" font-size="20" font-weight="bold">LoRA Merge Strategy Guide</text>
  <text x="510" y="60" text-anchor="middle" fill="#888" font-size="12">How LoRAs relate to each other — and what the optimizer does about it</text>

  <!-- Top decision node -->
  <rect x="340" y="78" width="340" height="42" rx="21" fill="none" stroke="#5c7cfa" stroke-width="2"/>
  <text x="510" y="104" text-anchor="middle" fill="#c3d0ff" font-size="13" font-weight="bold">Compatibility Analyzer measures each pair</text>

  <!-- Arrow down -->
  <line x1="510" y1="120" x2="510" y2="146" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Cosine similarity bar -->
  <rect x="280" y="148" width="460" height="28" rx="4" fill="#222840"/>
  <text x="510" y="167" text-anchor="middle" fill="#aab" font-size="11">Cosine Similarity — how much do the LoRAs point the same direction?</text>

  <!-- Three branches -->
  <line x1="380" y1="176" x2="168" y2="216" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="176" x2="510" y2="216" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="640" y1="176" x2="852" y2="216" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== LEFT: Orthogonal ===== -->
  <rect x="30" y="218" width="280" height="42" rx="8" fill="#1a3a2a" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="170" y="235" text-anchor="middle" fill="#4ecdc4" font-size="13" font-weight="bold">Orthogonal</text>
  <text x="170" y="252" text-anchor="middle" fill="#8abdb8" font-size="10.5">cos ~ 0.0  |  conflict ~ 50%</text>

  <rect x="30" y="270" width="280" height="100" rx="6" fill="#162230"/>
  <text x="170" y="290" text-anchor="middle" fill="#ccc" font-size="11" font-weight="bold">What this means</text>
  <text x="48" y="310" fill="#aaa" font-size="10.5">LoRAs modify completely different</text>
  <text x="48" y="326" fill="#aaa" font-size="10.5">aspects. ~50% sign conflict is random</text>
  <text x="48" y="342" fill="#aaa" font-size="10.5">noise, not real conflict.</text>
  <text x="48" y="362" fill="#7aa" font-size="10" font-style="italic">e.g. a style LoRA + a pose LoRA</text>

  <line x1="170" y1="370" x2="170" y2="392" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="30" y="394" width="280" height="50" rx="8" fill="#1a2a3a" stroke="#5c7cfa" stroke-width="1.5"/>
  <text x="170" y="414" text-anchor="middle" fill="#8ab4f8" font-size="13" font-weight="bold">weighted_average / SLERP</text>
  <text x="170" y="436" text-anchor="middle" fill="#aaa" font-size="10">Preserve both signals, SLERP keeps magnitude</text>

  <rect x="30" y="458" width="280" height="72" rx="6" fill="#111a28" stroke="#3a5070" stroke-width="1"/>
  <text x="170" y="478" text-anchor="middle" fill="#8ab4f8" font-size="11" font-weight="bold">Keep defaults — nothing to change</text>
  <text x="48" y="498" fill="#cc8888" font-size="10">Enabling refinement or sparsification</text>
  <text x="48" y="512" fill="#cc8888" font-size="10">would treat the noise as real conflict</text>
  <text x="48" y="526" fill="#cc8888" font-size="10">and hurt both LoRAs.</text>

  <!-- ===== CENTER: Conflicting ===== -->
  <rect x="370" y="218" width="280" height="42" rx="8" fill="#3a2a1a" stroke="#ffd93d" stroke-width="1.5"/>
  <text x="510" y="235" text-anchor="middle" fill="#ffd93d" font-size="13" font-weight="bold">Conflicting</text>
  <text x="510" y="252" text-anchor="middle" fill="#c4b06e" font-size="10.5">cos varies  |  conflict &gt; 25%</text>

  <rect x="370" y="270" width="280" height="100" rx="6" fill="#222030"/>
  <text x="510" y="290" text-anchor="middle" fill="#ccc" font-size="11" font-weight="bold">What this means</text>
  <text x="388" y="310" fill="#aaa" font-size="10.5">LoRAs modify overlapping layers and</text>
  <text x="388" y="326" fill="#aaa" font-size="10.5">disagree on which direction weights</text>
  <text x="388" y="342" fill="#aaa" font-size="10.5">should go. Real interference happens.</text>
  <text x="388" y="362" fill="#ba7" font-size="10" font-style="italic">e.g. two character LoRAs on same layers</text>

  <line x1="510" y1="370" x2="510" y2="392" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="370" y="394" width="280" height="50" rx="8" fill="#2a2a1a" stroke="#ffd93d" stroke-width="1.5"/>
  <text x="510" y="414" text-anchor="middle" fill="#ffe066" font-size="13" font-weight="bold">TIES</text>
  <text x="510" y="436" text-anchor="middle" fill="#aaa" font-size="10">Trim noise, elect majority sign, merge agreements</text>

  <rect x="370" y="458" width="280" height="72" rx="6" fill="#1a1a20" stroke="#5a4a30" stroke-width="1"/>
  <text x="510" y="478" text-anchor="middle" fill="#ffe066" font-size="11" font-weight="bold">Enable extra settings to help</text>
  <text x="388" y="498" fill="#6a9" font-size="10" font-family="monospace">merge_refinement</text>
  <text x="540" y="498" fill="#ffa" font-size="10">→ refine or full</text>
  <text x="388" y="516" fill="#6a9" font-size="10" font-family="monospace">sparsification</text>
  <text x="540" y="516" fill="#ffa" font-size="10">→ della_conflict</text>
  <text x="510" y="528" text-anchor="middle" fill="#667" font-size="9" font-style="italic">More conflict = more benefit</text>

  <!-- ===== RIGHT: Aligned ===== -->
  <rect x="710" y="218" width="280" height="42" rx="8" fill="#1a2a3a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="850" y="235" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">Aligned</text>
  <text x="850" y="252" text-anchor="middle" fill="#9a8abf" font-size="10.5">cos &gt; 0.5  |  conflict &lt; 15%</text>

  <rect x="710" y="270" width="280" height="100" rx="6" fill="#201a30"/>
  <text x="850" y="290" text-anchor="middle" fill="#ccc" font-size="11" font-weight="bold">What this means</text>
  <text x="728" y="310" fill="#aaa" font-size="10.5">LoRAs push weights in the same</text>
  <text x="728" y="326" fill="#aaa" font-size="10.5">direction — they reinforce each other.</text>
  <text x="728" y="342" fill="#aaa" font-size="10.5">Very little interference.</text>
  <text x="728" y="362" fill="#a8b" font-size="10" font-style="italic">e.g. same character, different train steps</text>

  <line x1="850" y1="370" x2="850" y2="392" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="710" y="394" width="280" height="50" rx="8" fill="#251a35" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="850" y="414" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="bold">consensus</text>
  <text x="850" y="436" text-anchor="middle" fill="#aaa" font-size="10">Fisher-proxy weighting + magnitude calibration</text>

  <rect x="710" y="458" width="280" height="72" rx="6" fill="#1a1828" stroke="#4a3a6a" stroke-width="1"/>
  <text x="850" y="478" text-anchor="middle" fill="#6edcd4" font-size="11" font-weight="bold">Keep defaults — nothing to change</text>
  <text x="728" y="498" fill="#88bbaa" font-size="10">Already highly compatible. Extra</text>
  <text x="728" y="512" fill="#88bbaa" font-size="10">processing adds compute, no benefit.</text>
  <text x="728" y="526" fill="#88bbaa" font-size="10">Simple stacking also works here.</text>

  <!-- ===== SPECIAL CASES ===== -->
  <rect x="30" y="554" width="960" height="208" rx="8" fill="#1a1a28" stroke="#555" stroke-width="1"/>
  <text x="510" y="578" text-anchor="middle" fill="#ccc" font-size="13" font-weight="bold">Special cases</text>

  <!-- No shared keys -->
  <rect x="50" y="594" width="290" height="74" rx="6" fill="#162230"/>
  <text x="195" y="614" text-anchor="middle" fill="#4ecdc4" font-size="11" font-weight="bold">No shared keys (independent)</text>
  <text x="195" y="634" text-anchor="middle" fill="#888" font-size="10.5">LoRAs target entirely different layers.</text>
  <text x="195" y="650" text-anchor="middle" fill="#888" font-size="10.5">Stack directly — no merge needed.</text>
  <text x="195" y="664" text-anchor="middle" fill="#8abdb8" font-size="10">Keep defaults, nothing to change.</text>

  <!-- Opposing -->
  <rect x="365" y="594" width="290" height="74" rx="6" fill="#2a1a1a"/>
  <text x="510" y="614" text-anchor="middle" fill="#ff8a8a" font-size="11" font-weight="bold">Opposing (cos &lt; -0.1)</text>
  <text x="510" y="634" text-anchor="middle" fill="#888" font-size="10.5">LoRAs cancel each other out.</text>
  <text x="510" y="650" text-anchor="middle" fill="#888" font-size="10.5">No setting can fix this — remove one</text>
  <text x="510" y="664" text-anchor="middle" fill="#888" font-size="10.5">or lower its strength significantly.</text>

  <!-- DPO / Edit -->
  <rect x="680" y="594" width="290" height="114" rx="6" fill="#1a2030"/>
  <text x="825" y="614" text-anchor="middle" fill="#8ab4f8" font-size="11" font-weight="bold">DPO / Edit / Distill LoRAs</text>
  <text x="825" y="634" text-anchor="middle" fill="#888" font-size="10.5">Weights must be preserved exactly.</text>
  <text x="825" y="650" text-anchor="middle" fill="#888" font-size="10.5">Conflict resolution would corrupt them.</text>
  <text x="825" y="670" text-anchor="middle" fill="#6a9" font-size="10" font-family="monospace">optimization_mode → additive</text>
  <text x="825" y="690" text-anchor="middle" fill="#888" font-size="10">or apply them independently as</text>
  <text x="825" y="704" text-anchor="middle" fill="#888" font-size="10">separate LoRA Loader nodes.</text>

  <!-- ===== HOW TO CHECK ===== -->
  <rect x="30" y="780" width="960" height="88" rx="8" fill="#141420" stroke="#4ecdc4" stroke-width="1"/>
  <text x="510" y="804" text-anchor="middle" fill="#ccc" font-size="13" font-weight="bold">How to check your LoRAs</text>

  <rect x="148" y="818" width="22" height="20" rx="4" fill="none" stroke="#4ecdc4" stroke-width="1"/>
  <text x="159" y="832" text-anchor="middle" fill="#4ecdc4" font-size="11" font-weight="bold">1</text>
  <text x="182" y="832" fill="#aaa" font-size="10.5">Connect your LoRA stack to the <tspan fill="#8ab4f8" font-weight="bold">Compatibility Analyzer</tspan> node</text>

  <rect x="148" y="842" width="22" height="20" rx="4" fill="none" stroke="#4ecdc4" stroke-width="1"/>
  <text x="159" y="856" text-anchor="middle" fill="#4ecdc4" font-size="11" font-weight="bold">2</text>
  <text x="182" y="856" fill="#aaa" font-size="10.5">Check the report: conflict %, cosine similarity, and group recommendations</text>
</svg>
