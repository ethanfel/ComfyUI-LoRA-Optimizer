<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 720" width="680" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="680" height="720" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="340" y="36" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#fff" text-anchor="middle">LoRA Optimizer — Development Timeline</text>

  <!-- Timeline line -->
  <line x1="32" y1="56" x2="32" y2="690" stroke="url(#line-grad)" stroke-width="2" opacity="0.4"/>

  <!-- Row helper: dot at x=32, text starts at x=52 -->
  <!-- 1 -->
  <circle cx="32" cy="68" r="5" fill="#e94560" filter="url(#glow)"/>
  <text x="52" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#e94560">Initial Release</text>
  <text x="240" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b">Basic weighted-sum LoRA merging</text>
  <rect x="570" y="60" width="46" height="16" rx="8" fill="#e94560" opacity="0.15"/>
  <text x="593" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#e94560" text-anchor="middle" font-weight="600">v1.0</text>

  <!-- 2 -->
  <circle cx="32" cy="120" r="5" fill="#f59e0b" filter="url(#glow)"/>
  <text x="52" y="117" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#f59e0b">LoRA Optimizer Node</text>
  <text x="52" y="132" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b">TIES merging with sign-conflict analysis + auto-strength + report output</text>

  <!-- 3 -->
  <circle cx="32" cy="168" r="5" fill="#c026d3" filter="url(#glow)"/>
  <text x="52" y="165" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#c026d3">GPU Acceleration</text>
  <text x="52" y="180" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b">CUDA-accelerated merge + thread-pool parallelization for CPU</text>

  <!-- 4 -->
  <circle cx="32" cy="216" r="5" fill="#c026d3" filter="url(#glow)"/>
  <text x="52" y="213" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#c026d3">Two-Pass Streaming</text>
  <text x="52" y="228" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b">~50 GB peak reduced to ~260 MB — runs on consumer hardware</text>

  <!-- 5 -->
  <circle cx="32" cy="264" r="5" fill="#a78bfa" filter="url(#glow)"/>
  <text x="52" y="261" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#a78bfa">Per-Prefix Adaptive Merge</text>
  <text x="52" y="276" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b">Each weight prefix analyzed independently — TIES or weighted sum per layer</text>

  <!-- 6 -->
  <circle cx="32" cy="312" r="5" fill="#22c55e" filter="url(#glow)"/>
  <text x="52" y="309" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#22c55e">SVD Patch Compression</text>
  <text x="52" y="324" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b">Post-merge low-rank re-compression — up to 128x RAM savings</text>

  <!-- 7 -->
  <circle cx="32" cy="360" r="5" fill="#a78bfa" filter="url(#glow)"/>
  <text x="52" y="357" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#a78bfa">SLERP Merge</text>
  <text x="52" y="372" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b">Spherical interpolation for 2-LoRA blending — preserves vector magnitude</text>

  <!-- 8 -->
  <circle cx="32" cy="408" r="5" fill="#64ffda" filter="url(#glow)"/>
  <text x="52" y="405" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#64ffda">Architecture-Aware Normalization</text>
  <text x="52" y="420" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b">Cross-trainer LoRA compat — auto-detects FLUX, SDXL, Wan, Z-Image, LTX</text>

  <!-- 9 -->
  <circle cx="32" cy="456" r="5" fill="#f59e0b" filter="url(#glow)"/>
  <text x="52" y="453" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#f59e0b">DARE / DELLA Sparsification</text>
  <text x="52" y="468" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b">Random weight dropout before merge — conflict-aware variant for hot areas</text>

  <!-- 10 -->
  <circle cx="32" cy="504" r="5" fill="#22c55e" filter="url(#glow)"/>
  <text x="52" y="501" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#22c55e">Save Merged LoRA</text>
  <text x="52" y="516" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b">Export merged result as standalone .safetensors — works with any loader</text>

  <!-- 11 -->
  <circle cx="32" cy="552" r="5" fill="#38bdf8" filter="url(#glow)"/>
  <text x="52" y="549" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#38bdf8">Dynamic LoRA Stacker</text>
  <text x="52" y="564" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b">1-10 adjustable slots, simple or advanced per-LoRA CLIP strength</text>

  <!-- 12 -->
  <circle cx="32" cy="600" r="5" fill="#e94560" filter="url(#glow)"/>
  <text x="52" y="597" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#e94560">Interference-Aware Auto-Strength</text>
  <text x="52" y="612" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b">Pairwise cosine similarity — scales strengths based on reinforcement vs cancellation</text>

  <!-- 13 -->
  <circle cx="32" cy="648" r="5" fill="#38bdf8" filter="url(#glow)"/>
  <text x="52" y="645" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#38bdf8">Text Input Mode + Name Resolution</text>
  <text x="52" y="660" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b">Type short LoRA names or connect text nodes — auto-resolves to full paths</text>

  <!-- End dot -->
  <circle cx="32" cy="690" r="3" fill="#a78bfa" opacity="0.6"/>

  <!-- Legend -->
  <rect x="100" y="696" width="480" height="18" rx="9" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <circle cx="130" cy="705" r="4" fill="#e94560"/>
  <text x="138" y="709" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#64748b">Feature</text>
  <circle cx="190" cy="705" r="4" fill="#c026d3"/>
  <text x="198" y="709" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#64748b">Perf</text>
  <circle cx="230" cy="705" r="4" fill="#a78bfa"/>
  <text x="238" y="709" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#64748b">Strategy</text>
  <circle cx="295" cy="705" r="4" fill="#22c55e"/>
  <text x="303" y="709" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#64748b">Optimize</text>
  <circle cx="365" cy="705" r="4" fill="#64ffda"/>
  <text x="373" y="709" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#64748b">Compat</text>
  <circle cx="425" cy="705" r="4" fill="#f59e0b"/>
  <text x="433" y="709" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#64748b">Preprocess</text>
  <circle cx="500" cy="705" r="4" fill="#38bdf8"/>
  <text x="508" y="709" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#64748b">Node</text>
</svg>
