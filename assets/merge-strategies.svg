<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580">
  <defs>
    <linearGradient id="sbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" rx="12" fill="url(#sbg)"/>

  <!-- Title -->
  <text x="450" y="28" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#64ffda" text-anchor="middle" font-weight="700" letter-spacing="2">MERGE STRATEGIES COMPARISON</text>

  <!-- ===== INPUT CARD ===== -->
  <rect x="30" y="45" width="840" height="108" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- Input header -->
  <text x="50" y="66" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#94a3b8" font-weight="600">INPUT LORA VECTORS</text>

  <!-- LoRA A legend -->
  <rect x="50" y="76" width="8" height="8" rx="2" fill="#f87171"/>
  <text x="63" y="84" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#f87171" font-weight="600">LoRA A</text>
  <text x="108" y="84" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#64748b">[+0.8, -0.3, +0.5, +0.2, -0.4, +0.1]</text>

  <!-- LoRA B legend -->
  <rect x="50" y="90" width="8" height="8" rx="2" fill="#c084fc"/>
  <text x="63" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#c084fc" font-weight="600">LoRA B</text>
  <text x="108" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#64748b">[+0.6, +0.4, -0.2, +0.3, -0.3, 0.0]</text>

  <!-- Conflict highlights at positions 2 and 3 -->
  <rect x="316" y="86" width="28" height="48" rx="4" fill="#f59e0b" opacity="0.07"/>
  <rect x="396" y="86" width="28" height="48" rx="4" fill="#f59e0b" opacity="0.07"/>

  <!-- Baseline -->
  <line x1="235" y1="110" x2="662" y2="110" stroke="#475569" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- LoRA A bars (width=9, color=#f87171)
       A: [+0.8, -0.3, +0.5, +0.2, -0.4, +0.1]  scale: 22px per 1.0 -->
  <rect x="240" y="92"  width="9" height="18" rx="2" fill="#f87171" opacity="0.85"/>
  <rect x="320" y="110" width="9" height="7"  rx="2" fill="#f87171" opacity="0.85"/>
  <rect x="400" y="99"  width="9" height="11" rx="2" fill="#f87171" opacity="0.85"/>
  <rect x="480" y="106" width="9" height="4"  rx="2" fill="#f87171" opacity="0.85"/>
  <rect x="560" y="110" width="9" height="9"  rx="2" fill="#f87171" opacity="0.85"/>
  <rect x="640" y="108" width="9" height="2"  rx="1" fill="#f87171" opacity="0.85"/>

  <!-- LoRA B bars (width=9, offset +11, color=#c084fc)
       B: [+0.6, +0.4, -0.2, +0.3, -0.3, 0.0] -->
  <rect x="251" y="97"  width="9" height="13" rx="2" fill="#c084fc" opacity="0.85"/>
  <rect x="331" y="101" width="9" height="9"  rx="2" fill="#c084fc" opacity="0.85"/>
  <rect x="411" y="110" width="9" height="4"  rx="2" fill="#c084fc" opacity="0.85"/>
  <rect x="491" y="103" width="9" height="7"  rx="2" fill="#c084fc" opacity="0.85"/>
  <rect x="571" y="110" width="9" height="7"  rx="2" fill="#c084fc" opacity="0.85"/>
  <!-- pos 6: B=0.0, no bar -->

  <!-- Position labels -->
  <text x="249" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">1</text>
  <text x="329" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" font-weight="600">2</text>
  <text x="409" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" font-weight="600">3</text>
  <text x="489" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">4</text>
  <text x="569" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">5</text>
  <text x="649" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">6</text>

  <!-- Conflict note -->
  <text x="730" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#f59e0b">Positions 2, 3 = sign conflict</text>
  <text x="730" y="121" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#64748b">(LoRAs push opposite directions)</text>

  <!-- ===== ROW 1: WEIGHTED_SUM ===== -->
  <rect x="30" y="163" width="840" height="70" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>

  <!-- Conflict column highlights -->
  <rect x="316" y="168" width="28" height="60" rx="4" fill="#f59e0b" opacity="0.05"/>
  <rect x="396" y="168" width="28" height="60" rx="4" fill="#f59e0b" opacity="0.05"/>

  <!-- Label -->
  <rect x="42" y="190" width="4" height="16" rx="2" fill="#22c55e"/>
  <text x="54" y="200" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#22c55e" font-weight="700">weighted_sum</text>
  <text x="54" y="215" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#64748b">Add with weights</text>

  <!-- +1.0 reference line (shows sum exceeds range) -->
  <line x1="235" y1="178" x2="662" y2="178" stroke="#475569" stroke-width="0.5" stroke-dasharray="2,4"/>
  <text x="668" y="181" font-family="Segoe UI, Arial, sans-serif" font-size="8" fill="#475569">1.0</text>

  <!-- Baseline -->
  <line x1="235" y1="200" x2="662" y2="200" stroke="#475569" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Result bars: [+1.4, +0.1, +0.3, +0.5, -0.7, +0.1] -->
  <rect x="240" y="169" width="20" height="31" rx="2" fill="#22c55e" opacity="0.85"/>
  <rect x="320" y="198" width="20" height="2"  rx="1" fill="#22c55e" opacity="0.85"/>
  <rect x="400" y="193" width="20" height="7"  rx="2" fill="#22c55e" opacity="0.85"/>
  <rect x="480" y="189" width="20" height="11" rx="2" fill="#22c55e" opacity="0.85"/>
  <rect x="560" y="200" width="20" height="15" rx="2" fill="#22c55e" opacity="0.85"/>
  <rect x="640" y="198" width="20" height="2"  rx="1" fill="#22c55e" opacity="0.85"/>

  <!-- Annotation -->
  <text x="710" y="193" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#94a3b8">Values add directly</text>
  <text x="710" y="208" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#64748b">Conflicts partially cancel</text>

  <!-- ===== ROW 2: WEIGHTED_AVERAGE ===== -->
  <rect x="30" y="240" width="840" height="70" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- Conflict column highlights -->
  <rect x="316" y="245" width="28" height="60" rx="4" fill="#f59e0b" opacity="0.05"/>
  <rect x="396" y="245" width="28" height="60" rx="4" fill="#f59e0b" opacity="0.05"/>

  <!-- Label -->
  <rect x="42" y="267" width="4" height="16" rx="2" fill="#3b82f6"/>
  <text x="54" y="277" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#3b82f6" font-weight="700">weighted_average</text>
  <text x="54" y="292" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#64748b">Normalize by count</text>

  <!-- Baseline -->
  <line x1="235" y1="277" x2="662" y2="277" stroke="#475569" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Result bars: [+0.7, +0.05, +0.15, +0.25, -0.35, +0.05] -->
  <rect x="240" y="262" width="20" height="15" rx="2" fill="#3b82f6" opacity="0.85"/>
  <rect x="320" y="276" width="20" height="1"  rx="0.5" fill="#3b82f6" opacity="0.85"/>
  <rect x="400" y="274" width="20" height="3"  rx="1" fill="#3b82f6" opacity="0.85"/>
  <rect x="480" y="271" width="20" height="6"  rx="2" fill="#3b82f6" opacity="0.85"/>
  <rect x="560" y="277" width="20" height="8"  rx="2" fill="#3b82f6" opacity="0.85"/>
  <rect x="640" y="276" width="20" height="1"  rx="0.5" fill="#3b82f6" opacity="0.85"/>

  <!-- Annotation -->
  <text x="710" y="270" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#94a3b8">Normalized, stays in range</text>
  <text x="710" y="285" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#64748b">Conflicts nearly cancel</text>

  <!-- ===== ROW 3: SLERP ===== -->
  <rect x="30" y="317" width="840" height="70" rx="10" fill="#1e293b" stroke="#c026d3" stroke-width="1.5"/>

  <!-- Conflict column highlights -->
  <rect x="316" y="322" width="28" height="60" rx="4" fill="#f59e0b" opacity="0.05"/>
  <rect x="396" y="322" width="28" height="60" rx="4" fill="#f59e0b" opacity="0.05"/>

  <!-- Label -->
  <rect x="42" y="344" width="4" height="16" rx="2" fill="#c026d3"/>
  <text x="54" y="354" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#c026d3" font-weight="700">slerp</text>
  <text x="54" y="369" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#64748b">Spherical interpolation</text>

  <!-- Baseline -->
  <line x1="235" y1="354" x2="662" y2="354" stroke="#475569" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Result bars: [+0.72, +0.02, +0.18, +0.26, -0.36, +0.04] -->
  <rect x="240" y="338" width="20" height="16" rx="2" fill="#c026d3" opacity="0.85"/>
  <rect x="320" y="353" width="20" height="1"  rx="0.5" fill="#c026d3" opacity="0.85"/>
  <rect x="400" y="350" width="20" height="4"  rx="1" fill="#c026d3" opacity="0.85"/>
  <rect x="480" y="348" width="20" height="6"  rx="2" fill="#c026d3" opacity="0.85"/>
  <rect x="560" y="354" width="20" height="8"  rx="2" fill="#c026d3" opacity="0.85"/>
  <rect x="640" y="353" width="20" height="1"  rx="0.5" fill="#c026d3" opacity="0.85"/>

  <!-- Annotation -->
  <text x="710" y="347" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#94a3b8">Interpolates along arc</text>
  <text x="710" y="362" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#64748b">Preserves magnitude profile</text>

  <!-- ===== ROW 4: TIES ===== -->
  <rect x="30" y="394" width="840" height="70" rx="10" fill="#1e293b" stroke="#e94560" stroke-width="1.5"/>

  <!-- Conflict column highlights (brighter — this is where the action is) -->
  <rect x="316" y="399" width="28" height="60" rx="4" fill="#f59e0b" opacity="0.08"/>
  <rect x="396" y="399" width="28" height="60" rx="4" fill="#f59e0b" opacity="0.08"/>

  <!-- Label -->
  <rect x="42" y="421" width="4" height="16" rx="2" fill="#e94560"/>
  <text x="54" y="431" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#e94560" font-weight="700">ties</text>
  <text x="54" y="446" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#64748b">Trim, Elect Sign, Merge</text>

  <!-- Baseline -->
  <line x1="235" y1="431" x2="662" y2="431" stroke="#475569" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Result bars: [+0.7, +0.4, +0.5, +0.25, -0.35, 0.0] -->
  <rect x="240" y="416" width="20" height="15" rx="2" fill="#e94560" opacity="0.85"/>
  <rect x="320" y="422" width="20" height="9"  rx="2" fill="#e94560" opacity="0.85"/>
  <rect x="400" y="420" width="20" height="11" rx="2" fill="#e94560" opacity="0.85"/>
  <rect x="480" y="425" width="20" height="6"  rx="2" fill="#e94560" opacity="0.85"/>
  <rect x="560" y="431" width="20" height="8"  rx="2" fill="#e94560" opacity="0.85"/>
  <!-- pos 6: 0.0, no bar (trimmed) -->

  <!-- Annotation -->
  <text x="710" y="424" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#94a3b8">Conflicts resolved decisively</text>
  <text x="710" y="439" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#64748b">Winner keeps full strength</text>

  <!-- ===== ROW 5: CONSENSUS ===== -->
  <rect x="30" y="471" width="840" height="70" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>

  <!-- Conflict column highlights -->
  <rect x="316" y="476" width="28" height="60" rx="4" fill="#f59e0b" opacity="0.05"/>
  <rect x="396" y="476" width="28" height="60" rx="4" fill="#f59e0b" opacity="0.05"/>

  <!-- Label -->
  <rect x="42" y="498" width="4" height="16" rx="2" fill="#22c55e"/>
  <text x="54" y="508" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#22c55e" font-weight="700">consensus</text>
  <text x="54" y="523" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#64748b">Fisher-weighted merge</text>

  <!-- Baseline -->
  <line x1="235" y1="508" x2="662" y2="508" stroke="#475569" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Result bars: [+0.74, +0.03, +0.22, +0.27, -0.37, +0.06] (importance-weighted, high-agreement LoRAs dominate) -->
  <rect x="240" y="492" width="20" height="16" rx="2" fill="#22c55e" opacity="0.85"/>
  <rect x="320" y="507" width="20" height="1"  rx="0.5" fill="#22c55e" opacity="0.85"/>
  <rect x="400" y="503" width="20" height="5"  rx="2" fill="#22c55e" opacity="0.85"/>
  <rect x="480" y="502" width="20" height="6"  rx="2" fill="#22c55e" opacity="0.85"/>
  <rect x="560" y="508" width="20" height="8"  rx="2" fill="#22c55e" opacity="0.85"/>
  <rect x="640" y="507" width="20" height="1"  rx="0.5" fill="#22c55e" opacity="0.85"/>

  <!-- Annotation -->
  <text x="710" y="501" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#94a3b8">Importance-weighted blend</text>
  <text x="710" y="516" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#64748b">High-agreement LoRAs dominate</text>

  <!-- Bottom note -->
  <text x="450" y="563" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Positions 2 and 3 have sign conflicts between LoRAs — compare how each strategy resolves them</text>
</svg>
